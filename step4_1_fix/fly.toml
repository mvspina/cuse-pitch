# fly.toml app configuration file generated for syracuse-pitch on 2026-02-20T17:01:12-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'syracuse-pitch'
primary_region = 'iad'

[mounts]
source = "data"
destination = "/data"

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  CUSE_PITCH_STATS_PATH = "/data/stats.json"
  SESSION_FILE_PATH = "/data/sessions"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/healthz"
  timeout = "2s"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
